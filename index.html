<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رسالة لرحمة ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(45deg,#ff4d6d,#ff8fab);
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}

.card{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,0,0,0.2);
}

h1{font-size:40px;}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
cursor:pointer;
}

.heart{
position:absolute;
color:white;
animation:float 6s infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="card">
<h1>رحمة</h1>
<p>جيتلك هدية 🥺</p>

<button onclick="alert('رحمة ❤️ انتِ أجمل شيء بحياتي')">
افتحي الهدية
</button>
</div>

<script>
for(let i=0;i<40;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(heart);
}
</script>

</body>
</html>
